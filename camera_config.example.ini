# VisionLine Inspector camera config template
# Set [app] mode=live to open RTSP cameras automatically on startup.
# Keep mode=video_test to use selected local video files.
#
# RTSP example:
# rtsp://USERNAME:PASSWORD@CAMERA_IP:554/Streaming/Channels/101
#
# If the RTSP password has special characters, URL encode them:
# @ should be written as %40
# # should be written as %23
# space should be written as %20

[app]
mode=video_test

[left_camera]
enabled=true
name=LEFT SIDE
source=rtsp://USERNAME:PASSWORD@CAMERA_IP:554/Streaming/Channels/101

[right_camera]
enabled=true
name=RIGHT SIDE
source=rtsp://USERNAME:PASSWORD@CAMERA_IP:554/Streaming/Channels/101

[stream]
use_ffmpeg=true
reconnect_seconds=2
max_no_frame_seconds=2
prefer_latest_frame=true
